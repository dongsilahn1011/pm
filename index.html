<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GamePM Tracker — Project NOVA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg0:#0D0D0F;--bg1:#141416;--bg2:#1C1C1F;--bg3:#232327;--bg4:#2C2C31;
  --border:#252529;--border2:#35353C;
  --text:#E6E6EA;--text2:#96969E;--text3:#52525A;
  --red:#E24B4A;--red-dim:#1A0D0D;--red-b:#2E1515;
  --amber:#EF9F27;--amber-dim:#1A1208;--amber-b:#2E2008;
  --green:#1D9E75;--green-dim:#0A1810;--green-b:#102A1C;
  --blue:#4A9EE0;--blue-dim:#0A1824;--blue-b:#183045;
  --purple:#8B7FE8;--purple-dim:#14102A;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg0);color:var(--text);}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;font-size:12px;}

.topbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:42px;background:var(--bg0);border-bottom:1px solid var(--border);flex-shrink:0;}
.t-logo{font-size:13px;font-weight:600;letter-spacing:-.2px;}
.t-project{font-size:11px;color:var(--text3);padding:2px 8px;border-radius:4px;background:var(--bg3);}
.t-sep{width:1px;height:16px;background:var(--border2);}
.t-crit{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;background:var(--red-dim);color:var(--red);border:1px solid var(--red-b);}
.t-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.sprint-wrap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);}
.sprint-bar{width:56px;height:3px;background:var(--border2);border-radius:2px;}
.sprint-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.btn-new{font-size:11px;font-weight:500;padding:5px 14px;border-radius:999px;border:1px solid var(--blue-b);background:var(--blue-dim);color:var(--blue);cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-new:hover{background:var(--blue);color:#fff;}

.tab-bar{display:flex;align-items:center;background:var(--bg1);border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0;height:40px;}
.vtab{font-size:12px;font-weight:500;padding:0 16px;height:100%;display:flex;align-items:center;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.vtab:hover{color:var(--text2);}
.vtab.on{color:var(--text);border-bottom-color:var(--blue);}

.filter-bar{display:flex;align-items:center;gap:0;padding:0 16px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;height:38px;overflow-x:auto;}
.fg{display:flex;align-items:center;gap:0;flex-shrink:0;}
.fg-label{font-size:10px;color:var(--text3);padding:0 8px 0 0;white-space:nowrap;letter-spacing:.04em;}
.fc{font-size:11px;padding:3px 10px;border-radius:4px;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .12s;white-space:nowrap;}
.fc:hover{color:var(--text2);background:var(--bg3);}
.fc.on{background:var(--bg3);color:var(--text);font-weight:500;}
.fd{width:1px;height:20px;background:var(--border2);margin:0 8px;flex-shrink:0;}
.fsel{font-size:11px;padding:3px 8px;border:1px solid var(--border2);border-radius:4px;background:var(--bg2);color:var(--text2);cursor:pointer;font-family:inherit;height:26px;}
.fsel.active{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}

.active-filters{display:none;align-items:center;gap:6px;padding:5px 16px;background:var(--blue-dim);border-bottom:1px solid var(--blue-b);font-size:11px;color:var(--blue);flex-shrink:0;}
.active-filters.show{display:flex;}
.af-clear{margin-left:auto;cursor:pointer;font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--blue-b);transition:all .15s;}
.af-clear:hover{background:var(--blue);color:#fff;}

.kpi-bar{display:flex;align-items:center;gap:0;padding:6px 16px;background:var(--bg0);border-bottom:1px solid var(--border);flex-shrink:0;}
.kpi-item{display:flex;align-items:center;gap:6px;padding:0 14px;border-right:1px solid var(--border2);}
.kpi-item:first-child{padding-left:0;}
.kpi-item:last-child{border-right:none;}
.kpi-n{font-size:16px;font-weight:600;}
.kpi-l{font-size:10px;color:var(--text3);}

.content{flex:1;overflow:hidden;display:flex;flex-direction:column;}

.list-wrap{flex:1;overflow-y:auto;}
.row{display:grid;grid-template-columns:20px 68px 1fr 52px 64px 52px 108px 68px;align-items:center;gap:8px;padding:9px 16px;border-bottom:1px solid var(--border);background:var(--bg1);cursor:pointer;transition:background .1s;}
.row:hover{background:var(--bg2);}
.row.done-row{opacity:.45;}
.hdr{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;background:var(--bg0);cursor:default;position:sticky;top:0;z-index:2;opacity:1!important;}
.itc{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.idc{font-size:10px;color:var(--blue);font-family:monospace;}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap;display:inline-block;border:1px solid transparent;}
.s-new{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-b);}
.s-prog{background:var(--green-dim);color:var(--green);border-color:var(--green-b);}
.s-qawait{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-b);}
.s-qa{background:var(--purple-dim);color:var(--purple);border-color:#241A3A;}
.s-fix{background:var(--red-dim);color:#E07070;border-color:var(--red-b);}
.s-done{background:var(--bg3);color:var(--text3);border-color:var(--border2);}
.bd{background:var(--bg3);color:var(--text2);border-color:var(--border2);}
.pd{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.p-crit{background:var(--red);}
.p-high{background:var(--amber);}
.p-norm{background:var(--blue);}
.p-low{background:var(--text3);}
.overdue{color:var(--red)!important;font-weight:500;}
.crit-row{border-left:2px solid var(--red);background:#110A0A!important;}
.crit-row:hover{background:#160D0D!important;}
.build-col{display:flex;flex-direction:column;gap:2px;}
.bver{font-weight:600;font-size:11px;}
.bname{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text3);}
.tdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

.kanban{flex:1;overflow-x:auto;display:flex;gap:8px;padding:12px;background:var(--bg0);}
.kol{min-width:172px;display:flex;flex-direction:column;gap:5px;}
.kol-hdr{font-size:11px;font-weight:500;padding:7px 10px;border-radius:6px;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);}
.kcount{font-size:10px;padding:1px 7px;border-radius:999px;background:var(--bg3);color:var(--text3);}
.kcard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px;display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:border-color .15s;}
.kcard:hover{border-color:var(--border2);}
.kcard.crit-card{border-left:2px solid var(--red);background:#110A0A;}
.kcard-title{font-size:11px;color:var(--text);line-height:1.45;}
.kcard-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.kcard-foot{display:flex;align-items:center;justify-content:space-between;}
.ksub{font-size:10px;color:var(--text3);}
.rl{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--blue);opacity:.6;transition:opacity .15s;text-decoration:none;}
.rl:hover{opacity:1;}

.team-view{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;background:var(--bg0);}
.team-block{background:var(--bg1);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.team-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg2);}
.team-title{font-size:13px;font-weight:600;}
.team-pills{display:flex;gap:5px;margin-left:auto;}
.tp{font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid transparent;}

.sch-wrap{flex:1;overflow-y:auto;padding:12px;background:var(--bg0);}
.week-group{margin-bottom:14px;}
.wk-label{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:5px;padding:0 2px;}
.sch-row{display:grid;grid-template-columns:72px 1fr 52px 64px 80px;align-items:center;gap:8px;padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;cursor:pointer;transition:background .1s;font-size:11px;}
.sch-row:hover{background:var(--bg3);}
.sch-d{font-size:11px;font-weight:500;color:var(--text3);}
.sch-today{color:var(--blue);font-weight:600;}
.sch-over{color:var(--red);}

.dbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:flex-start;justify-content:center;padding-top:40px;}
.dbg.open{display:flex;}
.dpanel{background:var(--bg2);border-radius:10px;border:1px solid var(--border2);width:540px;max-width:96vw;max-height:82vh;overflow-y:auto;display:flex;flex-direction:column;}
.d-hdr{display:flex;align-items:flex-start;gap:10px;padding:16px 20px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1;}
.d-id{font-family:monospace;font-size:11px;color:var(--blue);font-weight:600;flex-shrink:0;margin-top:3px;}
.d-title{font-size:15px;font-weight:600;color:var(--text);flex:1;line-height:1.4;}
.d-x{color:var(--text3);cursor:pointer;font-size:18px;flex-shrink:0;padding:0 4px;transition:color .15s;}
.d-x:hover{color:var(--text);}
.d-body{padding:16px 20px;display:flex;flex-direction:column;gap:14px;}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.d-field{display:flex;flex-direction:column;gap:4px;}
.d-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.d-val{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;}
.st-opts{display:flex;gap:5px;flex-wrap:wrap;}
.st-opt{font-size:11px;padding:4px 11px;border-radius:999px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.st-opt:hover{color:var(--text2);}
.st-opt.on{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
.d-actions{display:flex;gap:8px;padding:0 20px 16px;flex-wrap:wrap;}
.rm-btn{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--blue);cursor:pointer;padding:6px 14px;border-radius:6px;border:1px solid var(--blue-b);background:var(--blue-dim);transition:all .15s;font-family:inherit;}
.rm-btn:hover{background:var(--blue-b);}
.cl-btn{font-size:11px;padding:6px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;}
.cl-btn:hover{background:var(--bg3);}

.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:flex-start;justify-content:center;padding-top:48px;}
.mbg.open{display:flex;}
.modal{background:var(--bg2);border-radius:10px;border:1px solid var(--border2);width:500px;max-width:96vw;padding:22px;display:flex;flex-direction:column;gap:12px;}
.mhdr{font-size:14px;font-weight:600;}
.frow{display:flex;flex-direction:column;gap:4px;}
.flabel{font-size:11px;color:var(--text3);}
.finput,.fsel2{font-size:12px;padding:7px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:var(--text);font-family:inherit;width:100%;}
.finput:focus,.fsel2:focus{outline:none;border-color:var(--blue);}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:4px;}
.btn-c{font-size:12px;padding:6px 16px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;}
.btn-s{font-size:12px;font-weight:500;padding:6px 16px;background:var(--blue);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <span class="t-logo">GamePM</span>
  <span class="t-project">Project NOVA</span>
  <div class="t-sep"></div>
  <span class="t-crit" id="t-crit" style="display:none"><span id="tc-n">0</span> Critical</span>
  <div class="t-right">
    <div class="sprint-wrap">
      <span>Sprint 12 · Alpha Polish</span>
      <div class="sprint-bar"><div class="sprint-fill" id="sp-fill"></div></div>
      <span id="sp-pct" style="color:var(--green);font-weight:500">0%</span>
    </div>
    <button class="btn-new" onclick="openModal()">+ 새 이슈</button>
  </div>
</div>

<div class="tab-bar">
  <div class="vtab on" id="vt-list" onclick="setView('list')">리스트</div>
  <div class="vtab" id="vt-kanban" onclick="setView('kanban')">칸반</div>
  <div class="vtab" id="vt-team" onclick="setView('team')">팀별</div>
  <div class="vtab" id="vt-schedule" onclick="setView('schedule')">일정</div>
</div>

<div class="filter-bar">
  <div class="fg">
    <span class="fg-label">상태</span>
    <span class="fc on" id="fs-all" onclick="setSt('',this)">전체</span>
    <span class="fc" id="fs-new" onclick="setSt('신규',this)">신규</span>
    <span class="fc" id="fs-prog" onclick="setSt('진행중',this)">진행중</span>
    <span class="fc" id="fs-qawait" onclick="setSt('QA대기',this)">QA대기</span>
    <span class="fc" id="fs-qa" onclick="setSt('QA중',this)">QA중</span>
    <span class="fc" id="fs-fix" onclick="setSt('수정중',this)">수정중</span>
    <span class="fc" id="fs-done" onclick="setSt('완료',this)">완료</span>
  </div>
  <div class="fd"></div>
  <div class="fg">
    <span class="fg-label">릴리즈</span>
    <select class="fsel" id="relSel" onchange="render()">
      <option value="">전체</option>
      <option>v1.0</option><option>v1.1</option><option>v1.2</option><option>v1.3</option>
    </select>
  </div>
  <div class="fd"></div>
  <div class="fg">
    <span class="fg-label">파트</span>
    <select class="fsel" id="partSel" onchange="render()">
      <option value="">전체</option>
      <option>기획</option><option>아트</option><option>프로그램</option><option>QA팀</option><option>사운드</option>
    </select>
  </div>
  <div class="fd"></div>
  <div class="fg">
    <span class="fg-label">플랫폼</span>
    <span class="fc on" id="fp-all" onclick="setPf('',this)">전체</span>
    <span class="fc" id="fp-pc" onclick="setPf('PC',this)">PC</span>
    <span class="fc" id="fp-mob" onclick="setPf('Mobile',this)">Mobile</span>
  </div>
  <div class="fd"></div>
  <div class="fg">
    <span class="fg-label">기한</span>
    <span class="fc on" id="fd-all" onclick="setDate('all',this)">전체</span>
    <span class="fc" id="fd-over" onclick="setDate('over',this)">초과</span>
  </div>
  <div class="fd"></div>
  <div class="fg">
    <span class="fg-label">정렬</span>
    <select class="fsel" id="sortSel" onchange="render()">
      <option value="prio">우선순위</option>
      <option value="due">마감일</option>
      <option value="id">ID</option>
    </select>
  </div>
</div>

<div class="active-filters" id="af">
  <span id="af-text"></span>
  <span class="af-clear" onclick="clearAll()">전체 해제</span>
</div>

<div class="kpi-bar">
  <div class="kpi-item"><span class="kpi-n" id="s0">0</span><span class="kpi-l">전체</span></div>
  <div class="kpi-item"><span class="kpi-n" style="color:var(--green)" id="s1">0</span><span class="kpi-l">진행중</span></div>
  <div class="kpi-item"><span class="kpi-n" style="color:var(--purple)" id="s2">0</span><span class="kpi-l">QA중</span></div>
  <div class="kpi-item"><span class="kpi-n" style="color:var(--amber)" id="s3">0</span><span class="kpi-l">수정중</span></div>
  <div class="kpi-item"><span class="kpi-n" style="color:var(--red)" id="s4">0</span><span class="kpi-l">기한초과</span></div>
  <div class="kpi-item"><span class="kpi-n" style="color:var(--text3)" id="s5">0</span><span class="kpi-l">완료</span></div>
</div>

<div class="content" id="viewArea"></div>
</div>

<div class="dbg" id="dbg" onclick="bgClose(event)">
<div class="dpanel">
  <div class="d-hdr">
    <span class="d-id" id="d-id"></span>
    <span class="d-title" id="d-title"></span>
    <span class="d-x" onclick="closeDetail()">✕</span>
  </div>
  <div class="d-body">
    <div class="d-grid">
      <div class="d-field"><div class="d-label">상태</div><div class="d-val" id="d-st"></div></div>
      <div class="d-field"><div class="d-label">우선순위</div><div class="d-val" id="d-pr"></div></div>
      <div class="d-field"><div class="d-label">담당 파트</div><div class="d-val" id="d-pt"></div></div>
      <div class="d-field"><div class="d-label">담당자</div><div class="d-val" id="d-as"></div></div>
      <div class="d-field"><div class="d-label">릴리즈</div><div class="d-val" id="d-rl"></div></div>
      <div class="d-field"><div class="d-label">빌드</div><div class="d-val" id="d-bd"></div></div>
      <div class="d-field"><div class="d-label">플랫폼</div><div class="d-val" id="d-pf"></div></div>
      <div class="d-field"><div class="d-label">마감일</div><div class="d-val" id="d-du"></div></div>
    </div>
    <div>
      <div class="d-label" style="margin-bottom:8px;">상태 변경</div>
      <div class="st-opts" id="d-st-opts"></div>
    </div>
  </div>
  <div class="d-actions">
    <button class="rm-btn" onclick="openRedmine()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M7 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 2h4v4M14 2L8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Redmine에서 열기
    </button>
    <button class="cl-btn" onclick="closeDetail()">닫기</button>
  </div>
</div>
</div>

<div class="mbg" id="modalBg">
<div class="modal">
  <div class="mhdr">새 이슈 등록</div>
  <div class="frow"><div class="flabel">제목</div><input class="finput" id="nTitle" placeholder="이슈 제목을 입력하세요"></div>
  <div class="f3">
    <div class="frow"><div class="flabel">릴리즈</div><select class="fsel2" id="nRel" onchange="updBuild()"></select></div>
    <div class="frow"><div class="flabel">빌드</div><select class="fsel2" id="nBuild"></select></div>
    <div class="frow"><div class="flabel">빌드 유형</div><select class="fsel2" id="nType"><option>정기업데이트</option><option>긴급패치</option><option>핫픽스</option></select></div>
  </div>
  <div class="f3">
    <div class="frow"><div class="flabel">상태</div><select class="fsel2" id="nSt"><option>신규</option><option>진행중</option><option>QA대기</option><option>QA중</option><option>수정중</option><option>완료</option></select></div>
    <div class="frow"><div class="flabel">우선순위</div><select class="fsel2" id="nPr"><option>Normal</option><option>High</option><option>Critical</option><option>Low</option></select></div>
    <div class="frow"><div class="flabel">플랫폼</div><select class="fsel2" id="nPf"><option>공통</option><option>PC</option><option>Mobile</option></select></div>
  </div>
  <div class="f3">
    <div class="frow"><div class="flabel">담당 파트</div><select class="fsel2" id="nPt"><option>기획</option><option>아트</option><option>프로그램</option><option>QA팀</option><option>사운드</option></select></div>

<script>
const REDMINE='https://redmine.project-nova.com/issues/';
const TODAY=new Date('2025-07-03');
const PRIO_ORD={Critical:0,High:1,Normal:2,Low:3};
const STC=['신규','진행중','QA대기','QA중','수정중','완료'];
const STCLS={신규:'s-new',진행중:'s-prog','QA대기':'s-qawait','QA중':'s-qa',수정중:'s-fix',완료:'s-done'};
const TYPC={'정기업데이트':'#1D9E75','긴급패치':'#EF9F27','핫픽스':'#E24B4A'};
const PDOT={기획:'#1D9E75',아트:'#8B7FE8',프로그램:'#E07070','QA팀':'#D4537E',사운드:'#EF9F27'};
const AVC=['#4A9EE0','#1D9E75','#E07070','#8B7FE8','#D4537E','#EF9F27'];
const NAMES=['김OO','이OO','박OO','최OO','정OO','오OO'];
const KOLBG={신규:'#0A1620',진행중:'#081812','QA대기':'#1A1008','QA중':'#120E22',수정중:'#160A0A',완료:'#111113'};
const KOLTC={신규:'#4A9EE0',진행중:'#1D9E75','QA대기':'#EF9F27','QA중':'#8B7FE8',수정중:'#E07070',완료:'#52525A'};
const RELS=[
  {ver:'v1.0',name:'정식 출시',color:'#8B7FE8',builds:[{name:'1차 빌드',type:'정기업데이트'},{name:'2차 빌드',type:'정기업데이트'},{name:'3차 빌드',type:'핫픽스'}]},
  {ver:'v1.1',name:'시즌 1 업데이트',color:'#1D9E75',builds:[{name:'1차 빌드',type:'정기업데이트'},{name:'2차 빌드',type:'긴급패치'}]},
  {ver:'v1.2',name:'밸런스 패치',color:'#4A9EE0',builds:[{name:'1차 빌드',type:'정기업데이트'}]},
  {ver:'v1.3',name:'콜라보 이벤트',color:'#EF9F27',builds:[{name:'1차 빌드',type:'정기업데이트'}]},
];
const RMAP={};RELS.forEach(r=>RMAP[r.ver]=r);

let issues=[
  {id:'NOV-041',title:'보스 3페이즈 충돌 판정 오류',status:'수정중',prio:'Critical',part:'프로그램',assignee:'박OO',rel:'v1.3',build:'1차 빌드',type:'정기업데이트',pf:'PC',due:'2025-06-30'},
  {id:'NOV-040',title:'스킬 UI 쿨타임 표시 깨짐 (iPad)',status:'QA중',prio:'High',part:'아트',assignee:'이OO',rel:'v1.3',build:'1차 빌드',type:'정기업데이트',pf:'Mobile',due:'2025-07-05'},
  {id:'NOV-039',title:'서버 매칭 응답 지연 >5초',status:'진행중',prio:'Critical',part:'프로그램',assignee:'정OO',rel:'v1.2',build:'1차 빌드',type:'정기업데이트',pf:'공통',due:'2025-07-02'},
  {id:'NOV-038',title:'기본 공격 데미지 재밸런싱',status:'완료',prio:'Normal',part:'기획',assignee:'김OO',rel:'v1.2',build:'1차 빌드',type:'정기업데이트',pf:'공통',due:'2025-06-28'},
  {id:'NOV-037',title:'인벤토리 드래그 앤 드롭 구현',status:'진행중',prio:'Normal',part:'프로그램',assignee:'이OO',rel:'v1.3',build:'1차 빌드',type:'정기업데이트',pf:'PC',due:'2025-07-07'},
  {id:'NOV-036',title:'BGM 루프 끊김 (던전 1-3)',status:'QA대기',prio:'High',part:'사운드',assignee:'최OO',rel:'v1.1',build:'2차 빌드',type:'긴급패치',pf:'공통',due:'2025-07-04'},
  {id:'NOV-035',title:'로딩 화면 에셋 최적화',status:'완료',prio:'Low',part:'아트',assignee:'오OO',rel:'v1.0',build:'3차 빌드',type:'핫픽스',pf:'공통',due:'2025-06-25'},
  {id:'NOV-034',title:'신규 NPC 대화 누락',status:'신규',prio:'High',part:'기획',assignee:'박OO',rel:'v1.3',build:'1차 빌드',type:'정기업데이트',pf:'공통',due:'2025-07-06'},
  {id:'NOV-033',title:'파티 초대 알림 미수신 (Android)',status:'진행중',prio:'High',part:'프로그램',assignee:'정OO',rel:'v1.1',build:'2차 빌드',type:'긴급패치',pf:'Mobile',due:'2025-07-05'},
  {id:'NOV-032',title:'콜라보 스킨 이펙트 아트',status:'신규',prio:'Normal',part:'아트',assignee:'오OO',rel:'v1.3',build:'1차 빌드',type:'정기업데이트',pf:'공통',due:'2025-07-08'},
  {id:'NOV-031',title:'시즌1 캐릭터 선택 UI 개편',status:'진행중',prio:'Normal',part:'기획',assignee:'김OO',rel:'v1.1',build:'1차 빌드',type:'정기업데이트',pf:'공통',due:'2025-07-07'},
  {id:'NOV-030',title:'QA 테스트 케이스 문서화',status:'QA대기',prio:'Low',part:'QA팀',assignee:'최OO',rel:'v1.0',build:'2차 빌드',type:'정기업데이트',pf:'공통',due:'2025-07-10'},
  {id:'NOV-029',title:'튜토리얼 플로우 재설계',status:'수정중',prio:'High',part:'기획',assignee:'김OO',rel:'v1.0',build:'3차 빌드',type:'핫픽스',pf:'공통',due:'2025-07-01'},
  {id:'NOV-028',title:'모바일 터치 반응속도 개선',status:'QA중',prio:'High',part:'프로그램',assignee:'박OO',rel:'v1.1',build:'1차 빌드',type:'정기업데이트',pf:'Mobile',due:'2025-07-03'},
  {id:'NOV-027',title:'정식출시 아이템 드롭률 밸런스',status:'완료',prio:'Normal',part:'기획',assignee:'김OO',rel:'v1.0',build:'1차 빌드',type:'정기업데이트',pf:'공통',due:'2025-06-20'},
];

let nextNum=26,fSt='',fPf='',fDate='all',curView='list',curDid=null;

function isOver(i){return i.due&&new Date(i.due)<TODAY&&i.status!=='완료';}
function pcls(p){return p==='Critical'?'p-crit':p==='High'?'p-high':p==='Low'?'p-low':'p-norm';}
function avc(n){const i=NAMES.indexOf(n);return AVC[i>=0?i:0];}
function ini(n){return n.charAt(0);}
function avEl(n,sz=20){const c=avc(n);return `<div style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.45)}px;font-weight:600;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${c}20;color:${c};flex-shrink:0">${ini(n)}</div>`;}
function inum(id){return parseInt(id.replace('NOV-',''),10);}
function getR(){return document.getElementById('relSel').value;}
function getPt(){return document.getElementById('partSel').value;}
function getSort(){return document.getElementById('sortSel').value;}

function getFiltered(){
  const rel=getR(),pt=getPt(),sort=getSort();
  let d=issues.filter(i=>{
    if(rel&&i.rel!==rel)return false;
    if(pt&&i.part!==pt)return false;
    if(fSt&&i.status!==fSt)return false;
    if(fPf&&i.pf!==fPf)return false;
    if(fDate==='over'&&!isOver(i))return false;
    return true;
  });
  const active=d.filter(i=>i.status!=='완료');
  const done=d.filter(i=>i.status==='완료');
  const sortFn=(a,b)=>sort==='due'?(a.due||'9999')>(b.due||'9999')?1:-1:sort==='id'?b.id.localeCompare(a.id):PRIO_ORD[a.prio]-PRIO_ORD[b.prio];
  active.sort(sortFn);done.sort(sortFn);
  active.sort((a,b)=>{const ac=a.prio==='Critical',bc=b.prio==='Critical';return ac===bc?0:ac?-1:1;});
  return [...active,...done];
}

function updateAF(){
  const parts=[];
  if(fSt)parts.push(`상태: ${fSt}`);
  if(getR())parts.push(`릴리즈: ${getR()}`);
  if(getPt())parts.push(`파트: ${getPt()}`);
  if(fPf)parts.push(`플랫폼: ${fPf}`);
  if(fDate==='over')parts.push('기한초과');
  const el=document.getElementById('af');
  if(parts.length){el.classList.add('show');document.getElementById('af-text').textContent=`필터: ${parts.join(' / ')} — ${getFiltered().length}건 표시 중`;}
  else el.classList.remove('show');
  document.getElementById('relSel').classList.toggle('active',!!getR());
  document.getElementById('partSel').classList.toggle('active',!!getPt());
}

function render(){
  const all=issues;
  document.getElementById('s0').textContent=all.length;
  document.getElementById('s1').textContent=all.filter(i=>i.status==='진행중').length;
  document.getElementById('s2').textContent=all.filter(i=>i.status==='QA중').length;
  document.getElementById('s3').textContent=all.filter(i=>i.status==='수정중').length;
  document.getElementById('s4').textContent=all.filter(i=>isOver(i)).length;
  document.getElementById('s5').textContent=all.filter(i=>i.status==='완료').length;
  const crit=all.filter(i=>i.prio==='Critical'&&i.status!=='완료').length;
  document.getElementById('tc-n').textContent=crit;
  document.getElementById('t-crit').style.display=crit>0?'flex':'none';
  const pct=Math.round(all.filter(i=>i.status==='완료').length/all.length*100);
  document.getElementById('sp-fill').style.width=pct+'%';
  document.getElementById('sp-pct').textContent=pct+'%';
  updateAF();
  if(curView==='list')renderList();
  else if(curView==='kanban')renderKanban();
  else if(curView==='team')renderTeam();
  else renderSchedule();
}

function renderList(){
  const data=getFiltered();
  document.getElementById('viewArea').innerHTML=`<div class="list-wrap">
    <div class="row hdr"><span></span><span>ID</span><span>제목</span><span>파트</span><span>상태</span><span>플랫폼</span><span>릴리즈 · 빌드</span><span>마감일</span></div>
    ${data.map(i=>{
      const ov=isOver(i);const due=i.due?i.due.slice(5).replace('-','/'):'–';
      const r=RMAP[i.rel];const tc=TYPC[i.type]||'#888';
      const isCrit=i.prio==='Critical'&&i.status!=='완료';
      return `<div class="row${isCrit?' crit-row':''}${i.status==='완료'?' done-row':''}" onclick="openDetail('${i.id}')">
        <span><span class="pd ${pcls(i.prio)}"></span></span>
        <span class="idc">${i.id}</span>
        <span class="itc">${i.title}</span>
        <span><span class="badge bd">${i.part}</span></span>
        <span><span class="badge ${STCLS[i.status]||''}">${i.status}</span></span>
        <span><span class="badge bd">${i.pf}</span></span>
        <span class="build-col">
          <span class="bver" style="color:${r?.color||'#888'}">${i.rel} <span style="font-weight:400;color:var(--text3);font-size:10px">${r?.name||''}</span></span>
          <span class="bname"><span class="tdot" style="background:${tc}"></span>${i.build}</span>
        </span>
        <span class="${ov?'overdue':''}" style="font-size:11px">${due}${ov?' !':''}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function renderKanban(){
  document.getElementById('viewArea').innerHTML=`<div class="kanban">
    ${STC.map(st=>{
      const cards=getFiltered().filter(i=>i.status===st);
      return `<div class="kol">
        <div class="kol-hdr" style="background:${KOLBG[st]};color:${KOLTC[st]}"><span>${st}</span><span class="kcount">${cards.length}</span></div>
        ${cards.map(i=>{
          const ov=isOver(i);const due=i.due?i.due.slice(5).replace('-','/'):'–';
          const r=RMAP[i.rel];const tc=TYPC[i.type]||'#888';
          return `<div class="kcard${i.prio==='Critical'?' crit-card':''}" onclick="openDetail('${i.id}')">
            <div class="kcard-title">${i.title}</div>
            <div class="kcard-meta"><span class="badge bd">${i.part}</span><span class="pd ${pcls(i.prio)}" style="margin-left:2px"></span></div>
            <div class="kcard-foot"><span style="font-size:10px;font-weight:600;color:${r?.color||'#888'}">${i.rel} <span style="font-weight:400;color:var(--text3)">${i.build}</span></span>${avEl(i.assignee,18)}</div>
            <div class="kcard-foot">
              <a href="${REDMINE+inum(i.id)}" target="_blank" class="rl" onclick="event.stopPropagation()"><svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M7 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 2h4v4M14 2L8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>#${inum(i.id)}</a>
              <span class="ksub ${ov?'overdue':''}">${due}${ov?' !':''}</span>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
  </div>`;
}

function renderTeam(){
  const parts=['기획','아트','프로그램','QA팀','사운드'];
  document.getElementById('viewArea').innerHTML=`<div class="team-view">
    ${parts.map(part=>{
      const pi=getFiltered().filter(i=>i.part===part);
      if(!pi.length)return'';
      const dot=PDOT[part]||'#888';
      const active=pi.filter(i=>i.status!=='완료').length;
      const done=pi.filter(i=>i.status==='완료').length;
      const crit=pi.filter(i=>i.prio==='Critical'&&i.status!=='완료').length;
      return `<div class="team-block">
        <div class="team-hdr">
          <span style="width:9px;height:9px;border-radius:50%;background:${dot};display:inline-block;flex-shrink:0"></span>
          <span class="team-title">${part}</span>
          <div class="team-pills">
            ${crit>0?`<span class="tp" style="background:var(--red-dim);color:var(--red);border-color:var(--red-b)">Critical ${crit}</span>`:''}
            <span class="tp" style="background:var(--bg3);color:var(--text3);border-color:var(--border2)">진행 ${active}</span>
            <span class="tp" style="background:var(--green-dim);color:var(--green);border-color:var(--green-b)">완료 ${done}</span>
          </div>
        </div>
        ${pi.map(i=>{
          const ov=isOver(i);const due=i.due?i.due.slice(5).replace('-','/'):'–';
          const r=RMAP[i.rel];const isCrit=i.prio==='Critical'&&i.status!=='완료';
          return `<div class="row${isCrit?' crit-row':''}${i.status==='완료'?' done-row':''}" style="grid-template-columns:20px 68px 1fr 64px 44px 100px 68px;" onclick="openDetail('${i.id}')">
            <span><span class="pd ${pcls(i.prio)}"></span></span>
            <span class="idc">${i.id}</span>
            <span class="itc">${i.title}</span>
            <span><span class="badge ${STCLS[i.status]||''}">${i.status}</span></span>
            <span>${avEl(i.assignee,20)}</span>
            <span class="build-col"><span class="bver" style="color:${r?.color||'#888'}">${i.rel}</span><span class="bname">${i.build}</span></span>
            <span class="${ov?'overdue':''}" style="font-size:11px">${due}${ov?' !':''}</span>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
  </div>`;
}

function renderSchedule(){
  const todayStr=TODAY.toISOString().slice(0,10);
  const data=getFiltered().filter(i=>i.due&&i.status!=='완료').sort((a,b)=>a.due>b.due?1:-1);
  const weeks={};
  data.forEach(i=>{const d=new Date(i.due);const ws=new Date(d);ws.setDate(d.getDate()-d.getDay()+1);const k=ws.toISOString().slice(0,10);if(!weeks[k])weeks[k]=[];weeks[k].push(i);});
  document.getElementById('viewArea').innerHTML=`<div class="sch-wrap">
    ${Object.keys(weeks).length===0?`<div style="text-align:center;padding:40px;color:var(--text3)">표시할 일정이 없어요</div>`:''}
    ${Object.entries(weeks).map(([wk,items])=>{
      const wd=new Date(wk);const we=new Date(wk);we.setDate(we.getDate()+6);
      return `<div class="week-group">
        <div class="wk-label">${wd.getMonth()+1}/${wd.getDate()} – ${we.getMonth()+1}/${we.getDate()} 주</div>
        ${items.map(i=>{
          const ov=isOver(i);const isToday=i.due===todayStr;
          const d=new Date(i.due);const ds=`${d.getMonth()+1}/${d.getDate()}`;
          const r=RMAP[i.rel];
          return `<div class="sch-row" style="${i.prio==='Critical'?'border-left:2px solid var(--red);':''}" onclick="openDetail('${i.id}')">
            <span class="sch-d ${isToday?'sch-today':ov?'sch-over':''}">${ds}${isToday?' 오늘':ov?' 초과':''}</span>
            <span class="itc">${i.title}</span>
            <span><span class="badge bd">${i.part}</span></span>
            <span><span class="badge ${STCLS[i.status]||''}">${i.status}</span></span>
            <span style="display:flex;align-items:center;gap:5px;">${avEl(i.assignee,20)}<span style="font-size:10px;font-weight:600;color:${r?.color||'#888'}">${i.rel}</span></span>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
  </div>`;
}

function openDetail(id){
  const i=issues.find(x=>x.id===id);if(!i)return;
  curDid=id;
  const r=RMAP[i.rel];const ov=isOver(i);
  document.getElementById('d-id').textContent=`${i.id} · #${inum(i.id)}`;
  document.getElementById('d-title').textContent=i.title;
  document.getElementById('d-st').innerHTML=`<span class="badge ${STCLS[i.status]||''}">${i.status}</span>`;
  document.getElementById('d-pr').innerHTML=`<span class="pd ${pcls(i.prio)}"></span>${i.prio}`;
  document.getElementById('d-pt').textContent=i.part;
  document.getElementById('d-as').innerHTML=`${avEl(i.assignee,20)}<span>${i.assignee}</span>`;
  document.getElementById('d-rl').innerHTML=`<span style="color:${r?.color||'#888'};font-weight:600">${i.rel}</span> <span style="color:var(--text3)">${r?.name||''}</span>`;
  document.getElementById('d-bd').innerHTML=`<span class="tdot" style="background:${TYPC[i.type]||'#888'}"></span>${i.build} <span style="color:var(--text3)">(${i.type})</span>`;
  document.getElementById('d-pf').textContent=i.pf;
  document.getElementById('d-du').innerHTML=`<span class="${ov?'overdue':''}">${i.due||'–'}${ov?' · 기한초과':''}</span>`;
  document.getElementById('d-st-opts').innerHTML=STC.map(s=>`<span class="st-opt ${i.status===s?'on':''}" onclick="chgSt('${id}','${s}')">${s}</span>`).join('');
  document.getElementById('dbg').classList.add('open');
}
function chgSt(id,st){const i=issues.find(x=>x.id===id);if(!i)return;i.status=st;render();openDetail(id);}
function openRedmine(){if(curDid)window.open(REDMINE+inum(curDid),'_blank');}
function bgClose(e){if(e.target===document.getElementById('dbg'))closeDetail();}
function closeDetail(){document.getElementById('dbg').classList.remove('open');curDid=null;}

function setSt(v,el){fSt=v;['fs-all','fs-new','fs-prog','fs-qawait','fs-qa','fs-fix','fs-done'].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.remove('on');});el.classList.add('on');render();}
function setPf(v,el){fPf=v;['fp-all','fp-pc','fp-mob'].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.remove('on');});el.classList.add('on');render();}
function setDate(v,el){fDate=v;['fd-all','fd-over'].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.remove('on');});el.classList.add('on');render();}
function setView(v){curView=v;['list','kanban','team','schedule'].forEach(x=>document.getElementById('vt-'+x).classList.toggle('on',x===v));render();}
function clearAll(){
  fSt='';fPf='';fDate='all';
  document.getElementById('relSel').value='';
  document.getElementById('partSel').value='';
  document.getElementById('sortSel').value='prio';
  setSt('',document.getElementById('fs-all'));
  setPf('',document.getElementById('fp-all'));
  setDate('all',document.getElementById('fd-all'));
}
function updBuild(){const r=RMAP[document.getElementById('nRel').value];document.getElementById('nBuild').innerHTML=(r?.builds||[]).map(b=>`<option>${b.name}</option>`).join('');}
function openModal(){document.getElementById('nRel').innerHTML=RELS.map(r=>`<option value="${r.ver}">${r.ver} · ${r.name}</option>`).join('');updBuild();document.getElementById('nDue').value='2025-07-15';document.getElementById('modalBg').classList.add('open');}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}
function submitIssue(){
  const title=document.getElementById('nTitle').value.trim();if(!title){alert('제목을 입력해주세요.');return;}
  const num=String(nextNum--).padStart(3,'0');
  issues.unshift({id:'NOV-0'+num,title,status:document.getElementById('nSt').value,prio:document.getElementById('nPr').value,part:document.getElementById('nPt').value,assignee:document.getElementById('nAs').value,rel:document.getElementById('nRel').value,build:document.getElementById('nBuild').value,type:document.getElementById('nType').value,pf:document.getElementById('nPf').value,due:document.getElementById('nDue').value});
  closeModal();document.getElementById('nTitle').value='';render();
}
render();
</script>
